<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Login Curso Git</title>
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' width='64' height='64' viewBox='0 0 64 64'><circle cx='32' cy='32' r='30' fill='%23007bff'/><text x='32' y='40' font-family='Arial, sans-serif' font-size='20' font-weight='bold' text-anchor='middle' fill='white'>Git</text></svg>" />
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
    <div class="title">
        <h1>Titulo de la APP - (Master)</h1>
        <h2>Curso Git y GitHub - Editando desde la web - 2</h2>
        <svg xmlns="http://www.w3.org/2000/svg" width="64" height="64" viewBox="0 0 64 64">
            <circle cx="32" cy="32" r="30" fill="#007bff"/>
            <text x="32" y="40" font-family="Arial, sans-serif" font-size="20" font-weight="bold" text-anchor="middle" fill="white">Git</text>
        </svg>
    </div>
  <div class="login-card">
    <h2>Iniciar Sesión - Curso Git y GitHub</h2>
    <form id="loginForm" onsubmit="return false;">
      <div class="form-group">
        <label for="username">Usuario</label>
        <input type="text" id="username" name="username" placeholder="tu usuario" required />
      </div>
      <div class="form-group">
        <label for="password">Contraseña</label>
        <input type="password" id="password" name="password" placeholder="••••••••" required />
      </div>
      <button type="submit" class="btn" onclick="handleLogin();">Ingresar</button>
    </form>
    <p class="note" id="status"></p>
  </div>

  <script src="script.js"></script>
</body>
</html>
