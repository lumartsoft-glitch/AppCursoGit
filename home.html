<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Login Curso Git</title>
  <link rel="icon" href="assets/logo.png" />
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
    <div class="title">
        <img src="assets/logo.png" alt="Logo Git" width="128" height="128" />
        <h1>Titulo de la APP - (Master)</h1>
        <h2>Curso Git y GitHub - Editando desde la VS Code</h2>
    </div>
  <div class="login-card">
    <h2>Iniciar Sesión - Curso Git & GitHub</h2>
    <form id="loginForm" onsubmit="return false;">
      <div class="form-group">
        <label for="username">Usuario</label>
        <input type="text" id="username" name="username" placeholder="tu usuario" required />
      </div>
      <div class="form-group">
        <label for="password">Contraseña</label>
        <input type="password" id="password" name="password" placeholder="••••••••" required />
      </div>
      <button type="submit" class="btn" onclick="handleLogin();">Ingresar</button>
    </form>
    <p class="note" id="status"></p>
  </div>

  <script src="script.js"></script>
</body>
</html>
